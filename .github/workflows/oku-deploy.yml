name: OKU Deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy-frontend-vercel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Vercel secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          missing=0
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo "::error::Missing secret: VERCEL_TOKEN"
            missing=1
          fi
          if [ -z "${VERCEL_ORG_ID}" ]; then
            echo "::error::Missing secret: VERCEL_ORG_ID"
            missing=1
          fi
          if [ -z "${VERCEL_PROJECT_ID}" ]; then
            echo "::error::Missing secret: VERCEL_PROJECT_ID"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            echo "Please set required repository secrets in GitHub: Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Deploy frontend to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-args: --prod
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend

  redeploy-backend-render:
    runs-on: ubuntu-latest
    steps:
      - name: Redeploy backend on Render
        env:
          RENDER_WEBHOOK_URL: ${{ secrets.RENDER_WEBHOOK_URL }}
        run: |
          if [ -z "${RENDER_WEBHOOK_URL}" ]; then
            echo "RENDER_WEBHOOK_URL secret is not set. Skip backend redeploy."
            exit 0
          fi
          curl -fsSL -X POST "${RENDER_WEBHOOK_URL}"

